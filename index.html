<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art Guide - Global 100 Art Spaces</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    
    body { 
      margin: 0; 
      background-color: #050505; 
      overflow: hidden; 
      font-family: 'Pretendard', sans-serif; 
    }
    
    /* 상단 타이틀 */
    #title-overlay {
      position: absolute; 
      top: 30px; 
      left: 30px; 
      color: white;
      z-index: 10; 
      pointer-events: none; 
      text-shadow: 0px 4px 15px rgba(0, 242, 255, 0.6);
    }
    #title-overlay h1 { margin: 0; font-size: 28px; font-weight: 800; letter-spacing: 1px; }
    #title-overlay p { margin: 8px 0 0; font-size: 14px; color: #aaa; }

    /* 좌측 하단 국제 시간 탭 패널 */
    #time-panel {
      position: absolute;
      bottom: 30px;
      left: 30px;
      z-index: 10;
      background: rgba(10, 15, 20, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 242, 255, 0.3);
      border-radius: 12px;
      padding: 20px;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
    }
    
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }
    
    .tab {
      padding: 6px 12px;
      background: rgba(255, 255, 255, 0.1);
      color: #aaa;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1px solid transparent;
    }
    
    .tab:hover { background: rgba(255, 255, 255, 0.2); color: #fff; }
    
    .tab.active {
      background: rgba(0, 242, 255, 0.15);
      color: #00f2ff;
      border-color: #00f2ff;
      box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
    }

    #time-display {
      color: #fff;
    }
    #time-date { font-size: 13px; color: #888; margin-bottom: 5px; }
    #time-clock { font-size: 26px; font-weight: 700; color: #fff; letter-spacing: 1px; }

    /* 툴팁 스타일 */
    .scene-tooltip {
      background: rgba(0, 5, 10, 0.95) !important;
      border: 1px solid #00f2ff !important;
      border-radius: 8px !important;
      padding: 15px !important;
      box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
      font-family: 'Pretendard', sans-serif;
    }
    .tooltip-content { width: 220px; color: #fff; pointer-events: none; }
    .tooltip-content b { 
      font-size: 18px; 
      color: #00f2ff; 
      display: block; 
      margin-bottom: 8px; 
      border-bottom: 1px solid rgba(255,255,255,0.2); 
      padding-bottom: 8px; 
    }
    .exhibit-info { font-size: 13px; color: #ccc; line-height: 1.6; }
  </style>
</head>
<body>

  <div id="title-overlay">
    <h1>Art Guide Globe</h1>
    <p>실시간 100대 미술관 가이드 (2026. 04. 17.)</p>
  </div>

  <div id="time-panel">
   <div class="tabs">
      <div class="tab active" data-tz="Asia/Seoul">Seoul</div>
      <div class="tab" data-tz="Asia/Hong_Kong">Hong Kong</div>
      <div class="tab" data-tz="America/New_York">New York</div>
      <div class="tab" data-tz="Europe/London">London</div>
      <div class="tab" data-tz="Europe/Paris">Paris</div>
      <div class="tab" data-tz="Europe/Berlin">Berlin</div>
      <div class="tab" data-tz="Europe/Rome">Venice</div>
      <div class="tab" data-tz="Europe/Zurich">Basel</div>
    </div>
    <div id="time-display">
      <div id="time-date">로딩 중...</div>
      <div id="time-clock">00:00:00</div>
    </div>
  </div>

  <div id="globeViz"></div>

  <script src="https://unpkg.com/three"></script>
  <script src="https://unpkg.com/globe.gl"></script>

  <script>
    // 1. 임의의 주요 미술관 데이터 (실제 서비스 시 100개 데이터로 확장)
    const artSpaces = [
      { name: "국립현대미술관 (MMCA)", city: "Seoul", lat: 37.582, lng: 126.982, alt: 0.15, desc: "한국 현대미술의 중심지" },
      { name: "모리 미술관", city: "Tokyo", lat: 35.660, lng: 139.729, alt: 0.15, desc: "롯폰기 힐즈의 현대미술관" },
      { name: "LACMA", city: "LA", lat: 34.063, lng: -118.359, alt: 0.15, desc: "미국 서부 최대 규모의 미술관" },
      { name: "MoMA", city: "New York", lat: 40.761, lng: -73.977, alt: 0.15, desc: "세계 최고의 현대미술 컬렉션" },
      { name: "테이트 모던", city: "London", lat: 51.507, lng: -0.099, alt: 0.15, desc: "발전소를 개조한 현대미술관" },
      { name: "루브르 박물관", city: "Paris", lat: 48.860, lng: 2.337, alt: 0.15, desc: "세계 3대 박물관 중 하나" }
    ];

    // 2. 지구본 초기화
    const world = Globe()
      (document.getElementById('globeViz'))
      .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
      .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
      .showAtmosphere(true)
      .atmosphereColor('#00f2ff')
      .atmosphereAltitude(0.15)
      
      // 기둥(사이언 색) 세팅
      .pointsData(artSpaces)
      .pointAltitude('alt')
      .pointColor(() => '#00f2ff')
      .pointRadius(0.8)
      .pointResolution(32)
      
      // 툴팁(라벨) 세팅
      .pointLabel(d => `
        <div class="tooltip-content">
          <b>${d.name}</b>
          <div class="exhibit-info">
            도시: ${d.city}<br/>
            특징: ${d.desc}
          </div>
        </div>
      `)
      
      // [요구사항 1] 마우스 호버 시 회전 멈춤
      .onPointHover(point => {
        // point가 존재하면(호버 중이면) 자동 회전을 끄고, 벗어나면 다시 켭니다.
        world.controls().autoRotate = !point;
        document.body.style.cursor = point ? 'pointer' : 'default';
      });

    // 카메라 및 컨트롤 초기 세팅
    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 1.2;
    world.pointOfView({ lat: 37.5, lng: 126.9, altitude: 2.5 });

   // ==========================================
    // 3. 좌측 하단 국제 날짜/시간 탭 로직 (먼저 실행)
    // ==========================================
    // 3D 렌더링 지연에 영향을 받지 않도록 시계 로직을 위로 올렸습니다.
    let currentTimeZone = 'Asia/Seoul';
    
    const tabs = document.querySelectorAll('.tab');
    const dateDisplay = document.getElementById('time-date');
    const clockDisplay = document.getElementById('time-clock');

    // 탭 클릭 이벤트
    tabs.forEach(tab => {
      tab.addEventListener('click', (e) => {
        tabs.forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        
        currentTimeZone = e.target.getAttribute('data-tz');
        updateClock();
      });
    });

    // 시계 업데이트 함수
    function updateClock() {
      const now = new Date();
      
      const dateFormatter = new Intl.DateTimeFormat('ko-KR', {
        timeZone: currentTimeZone,
        year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'
      });
      
      const timeFormatter = new Intl.DateTimeFormat('en-US', {
        timeZone: currentTimeZone,
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
      });

      dateDisplay.textContent = dateFormatter.format(now);
      clockDisplay.textContent = timeFormatter.format(now);
    }

    // 시계 루프 즉시 실행
    setInterval(updateClock, 1000);
    updateClock(); 

    // ==========================================
    // 4. 실시간 낮과 밤 조명 표현 (충돌 없는 안전한 방식)
    // ==========================================
    // Globe.gl 씬이 완전히 로드될 시간을 넉넉히 주기 위해 1초(1000ms) 지연합니다.
    setTimeout(() => {
      const scene = world.scene();
      const camera = world.camera();

      // 1. 그래픽 충돌 방지: Globe.gl의 기본 카메라 조명(항상 정면을 비춤)을 깔끔하게 제거
      camera.children = camera.children.filter(c => c.type !== 'DirectionalLight');
      
      // 2. 밤 영역 설정: 씬에 있는 기본 환경광을 찾아서 달빛처럼 아주 어둡게(0.05) 조절
      scene.children.forEach(c => {
        if (c.type === 'AmbientLight') {
          c.intensity = 0.05; 
        }
      });

      // 3. 낮 영역 설정: 새로운 강력한 태양광 생성 후 추가
      const sunLight = new THREE.DirectionalLight(0xffffff, 4.0); 
      scene.add(sunLight);

      // 4. 태양 위치 계산 함수 (라이브러리 함수에 의존하지 않는 안전한 수학 공식)
      function updateSunPosition() {
        const now = new Date();
        const start = new Date(now.getFullYear(), 0, 0);
        const diff = now - start;
        const dayOfYear = Math.floor(diff / (1000 * 60 * 60 * 24));
        
        // 현재 시간에 따른 태양의 위도(declination)와 경도(sunLng) 계산
        const declination = -23.44 * Math.cos((360 / 365) * (dayOfYear + 10) * (Math.PI / 180));
        const utcHours = now.getUTCHours() + now.getUTCMinutes() / 60 + now.getUTCSeconds() / 3600;
        const sunLng = 180 - (utcHours * 15);

        // 라이브러리 충돌을 막기 위해 구면 좌표계를 직접 3D(x, y, z) 좌표로 변환
        // 지구본 반지름이 기본 100이므로 빛을 300 거리에서 비추도록 설정
        const radius = 300; 
        const phi = (90 - declination) * (Math.PI / 180);
        const theta = (90 - sunLng) * (Math.PI / 180);

        sunLight.position.x = radius * Math.sin(phi) * Math.cos(theta);
        sunLight.position.y = radius * Math.cos(phi);
        sunLight.position.z = radius * Math.sin(phi) * Math.sin(theta);
      }
      
      // 최초 1회 실행 후, 무한 루프 대신 1분(60000ms)마다 여유롭게 갱신
      updateSunPosition();
      setInterval(updateSunPosition, 60000);

    }, 1000);
