<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art Guide - Global 1000 Art Spaces</title>
  <style>
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background-color: #000; overflow: hidden; font-family: sans-serif;
    }
    #globeViz {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; z-index: 1;
    }
    #title-overlay {
      position: absolute; top: 20px; left: 20px; color: white;
      z-index: 10; pointer-events: none;
    }
    #time-panel {
      position: absolute; bottom: 20px; left: 20px; z-index: 10;
      background: rgba(0, 0, 0, 0.85); border: 1px solid #00f2ff;
      border-radius: 10px; padding: 15px; width: 280px; color: white;
      box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
    }
    .tabs { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
    .tab { 
      padding: 5px 10px; background: #222; border-radius: 5px; 
      font-size: 11px; cursor: pointer; border: 1px solid #444; color: #fff;
    }
    .tab.active { background: #00f2ff; color: #000; border-color: #00f2ff; }
    #time-clock { font-size: 24px; font-weight: bold; margin-top: 5px; color: #00f2ff; }
    #status-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #444; z-index: 2; font-size: 12px; }
  </style>
</head>
<body>
  
  <div id="status-msg">지구본 엔진 로딩 중...</div>

  <div id="title-overlay">
    <h2 style="margin:0">Art Guide Globe</h2>
    <p style="margin:5px 0; font-size:12px; color:#00f2ff">실시간 1000대 미술관 가이드</p>
  </div>

  <div id="time-panel">
    <div class="tabs">
      <div class="tab active" data-tz="Asia/Seoul">SEOUL</div>
      <div class="tab" data-tz="Asia/Hong_Kong">HK</div>
      <div class="tab" data-tz="America/New_York">NY</div>
      <div class="tab" data-tz="Europe/London">LDN</div>
      <div class="tab" data-tz="Europe/Paris">PAR</div>
      <div class="tab" data-tz="Asia/Tokyo">TKO</div>
    </div>
    <div id="time-display">
      <div id="time-date" style="font-size:12px; color:#aaa">날짜 계산 중...</div>
      <div id="time-clock">00:00:00</div>
    </div>
  </div>

  <div id="globeViz"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/globe.gl@2.31.1/dist/globe.gl.min.js"></script>

  <script>
    // 1. 시계 로직 (즉시 실행)
    let currentTimeZone = 'Asia/Seoul';
    function updateClock() {
      const now = new Date();
      try {
        const options = { timeZone: currentTimeZone, hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' };
        const dateOptions = { timeZone: currentTimeZone, year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('time-clock').textContent = now.toLocaleTimeString('en-US', options);
        document.getElementById('time-date').textContent = now.toLocaleDateString('ko-KR', dateOptions);
      } catch(e) {}
    }
    document.querySelectorAll('.tab').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTimeZone = btn.dataset.tz;
        updateClock();
      };
    });
    setInterval(updateClock, 1000);
    updateClock();

    // 2. 지구본 무한 대기 및 실행 로직 (에러 해결 핵심)
    function tryInitGlobe() {
      // Globe 라이브러리가 로드되었는지 체크
      if (typeof Globe === 'undefined' || typeof THREE === 'undefined') {
        console.log("대기 중: 라이브러리 로딩 확인 중...");
        setTimeout(tryInitGlobe, 100); // 0.1초 뒤 다시 시도
        return;
      }

      console.log("성공: 라이브러리 로드 완료. 지구본을 생성합니다.");
      document.getElementById('status-msg').style.display = 'none';

      const artData = [...Array(1000).keys()].map(i => ({
        name: `Art Space #${i}`,
        lat: (Math.random() - 0.5) * 160,
        lng: (Math.random() - 0.5) * 360
      }));

      const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
        .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
        .showAtmosphere(true)
        .atmosphereColor('#00f2ff')
        .atmosphereAltitude(0.15)
        .customLayerData(artData)
        .customThreeObject(() => new THREE.Mesh(
          new THREE.SphereGeometry(0.4),
          new THREE.MeshBasicMaterial({ color: 0x00f2ff })
        ))
        .customThreeObjectUpdate((obj) => {
          const s = 0.7 + Math.abs(Math.sin(Date.now() * 0.002 + Math.random()));
          obj.scale.set(s, s, s);
        });

      world.controls().autoRotate = true;
      world.controls().autoRotateSpeed = 1.0;
      world.pointOfView({ lat: 37, lng: 127, altitude: 2.5 });

      world.onGlobeReady(() => {
        const scene = world.scene();
        const sun = new THREE.DirectionalLight(0xffffff, 3.0);
        sun.position.set(1, 1, 1);
        scene.add(sun);

        new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-night.jpg', tex => {
          const mat = world.globeMaterial();
          mat.emissiveMap = tex;
          mat.emissive = new THREE.Color(0xffeeba);
          mat.emissiveIntensity = 2.0;
        });
      });

      window.addEventListener('resize', () => {
        world.width(window.innerWidth).height(window.innerHeight);
      });
    }

    // 초기 실행 시도
    tryInitGlobe();
  </script>
</body>
</html>
