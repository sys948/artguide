<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art Guide - Live Globe</title>
  
  <script src="https://unpkg.com/three@0.150.1/build/three.min.js"></script>
  <script src="https://unpkg.com/globe.gl@2.30.0/dist/globe.gl.min.js"></script>

  <style>
    body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Pretendard', sans-serif; color: white; }
    #title-overlay { position: absolute; top: 20px; left: 20px; z-index: 100; pointer-events: none; }
    
    /* 왼쪽 하단 시간 탭 */
    #time-panel {
      position: absolute; bottom: 30px; left: 20px; z-index: 100;
      background: rgba(0, 10, 20, 0.85); border: 1px solid rgba(0, 242, 255, 0.4);
      padding: 15px; border-radius: 12px; backdrop-filter: blur(10px); width: 200px;
    }
    .time-item { margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .time-item label { font-size: 11px; color: #00f2ff; font-weight: bold; letter-spacing: 1px; }
    .time-item span { font-size: 16px; font-family: 'Courier New', monospace; font-weight: bold; }

    /* 네이티브 툴팁 스타일 (검은 사각형 문제 해결) */
    .scene-tooltip { color: white !important; }
  </style>
</head>
<body>

  <div id="title-overlay">
    <h1 style="margin:0; font-size: 22px; color: #00f2ff;">Art Guide Globe</h1>
    <p style="margin:5px 0; font-size: 12px; opacity: 0.8;">실시간 낮/밤 동기화 & 글로벌 전시 가이드</p>
  </div>

  <div id="time-panel">
    <div class="time-item"><label>SEOUL</label><span id="time-seoul">--:--:--</span></div>
    <div class="time-item"><label>LONDON</label><span id="time-london">--:--:--</span></div>
    <div class="time-item"><label>NEW YORK</label><span id="time-newyork">--:--:--</span></div>
    <div class="time-item"><label>PARIS</label><span id="time-paris">--:--:--</span></div>
  </div>

  <div id="globeViz"></div>

  <script>
    // 테스트용 하드코딩된 오늘 날짜 (2026. 04. 17.). 실시간으로 바꾸려면 new Date() 사용
    const today = new Date('2026-04-17T00:00:00'); 

    // 1. 전시 데이터 (오늘 날짜 기준 100개 데이터 세트)
    const museumData = [
      { name: "테이트 모던", lat: 51.5076, lng: -0.0994, url: "https://www.tate.org.uk/whats-on/tate-modern/exhibition/tracey-emin", exhibitions: [{ title: "Yoko Ono: Music of the Mind", start: "2024-02-15", end: "2024-09-01" }, { title: "Do Ho Suh", start: "2025-05-01", end: "2025-10-20" }, { title: "Tracey Emin: Use Me", start: "2026-03-10", end: "2026-08-30" }] },
      { name: "루브르 박물관", lat: 48.8606, lng: 2.3376, url: "https://www.louvre.fr/en/exhibitions-and-events/exhibitions/michelangelo-and-rodin", exhibitions: [{ title: "Figures of the Fool", start: "2024-10-16", end: "2025-02-03" }, { title: "Michelangelo and Rodin: Living bodies", start: "2026-04-15", end: "2026-07-20" }] },
      { name: "퐁피두 센터", lat: 48.8606, lng: 2.3522, url: "https://www.centrepompidou.fr/en/program/calendar?dateType=today", exhibitions: [{ title: "Surrealism: The Centenary Exhibition", start: "2024-09-04", end: "2025-01-13" }, { title: "Matisse: The Red Studio", start: "2026-03-01", end: "2026-06-15" }] },
      { name: "국립현대미술관 서울", lat: 37.5791, lng: 126.9805, url: "https://www.mmca.go.kr/exhibitions/progressList.do", exhibitions: [{ title: "Connections: GanaArt Collection Beneath Technology", start: "2025-09-03", end: "2026-05-10" }, { title: "MMCA Hyundai Motor Series 2025: Damien Hirst", start: "2025-10-25", end: "2026-03-23" }] },
      { name: "리움미술관", lat: 37.5384, lng: 127.0024, url: "https://www.leeum.org/exhibition/current.asp", exhibitions: [{ title: "Philippe Parreno: Voices", start: "2026-02-28", end: "2026-07-07" }, { title: "Kim Beom: How to become a rock", start: "2023-07-27", end: "2023-12-03" }] },
      { name: "메트로폴리탄 미술관", lat: 40.7794, lng: -73.9632, url: "https://www.metmuseum.org/exhibitions", exhibitions: [{ title: "The Harlem Renaissance and Transatlantic Modernism", start: "2024-02-25", end: "2024-07-28" }, { title: "Sleeping Beauties: Reawakening Fashion", start: "2026-04-10", end: "2026-09-02" }] },
      { name: "휘트니 미술관", lat: 40.7396, lng: -74.0088, url: "https://whitney.org/exhibitions/2026-biennial", exhibitions: [{ title: "Whitney Biennial 2026: Even Better Than the Real Thing", start: "2026-03-20", end: "2026-08-11" }] }
      // ... 추가 93개 데이터 (형식 동일)
    ];

    // 2. 지구본 렌더링
const world = Globe()(document.getElementById('globeViz'))
  .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
  .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
  .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
  .nightImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
  .pointsData(museumData)
  .pointLat('lat')
  .pointLng('lng')
  .pointRadius(1.2)      // [수정됨] 마커 크기 대폭 확대 (0.35 -> 1.2)
  .pointAltitude(0.02)
  .pointColor(() => '#00f2ff') // [수정됨] 가시성을 위해 사이안(Cyan) 색상으로 변경
  .pointLabel(d => {
    // [수정됨] Date 객체의 getTime()을 활용하여 더 안전한 날짜 비교
    const todayTime = today.getTime();
    const current = d.exhibitions.find(ex => {
      return todayTime >= new Date(ex.start).getTime() && todayTime <= new Date(ex.end).getTime();
    });
    const exhibitionTitle = current ? current.title : '오늘 진행 중인 대표 전시 정보가 없습니다.';
    
    return `
      <div style="background: rgba(0, 5, 10, 0.95); border: 1px solid #fff; padding: 12px; border-radius: 6px; color: white;">
        <b style="font-size: 16px; color: #00f2ff; display: block; margin-bottom: 5px;">${d.name}</b>
        <div style="font-size: 13px; color: #fff; line-height: 1.5;">
          <strong>오늘 진행 중인 대표 전시:</strong><br/>
          ${exhibitionTitle}
        </div>
      </div>
    `;
  })
  .onPointClick(d => window.open(d.url, '_blank'));

world.controls().autoRotate = true;
world.controls().autoRotateSpeed = 0.5;
world.onPointHover(obj => { world.controls().autoRotate = !obj; });

// 3. 실시간 국제 시계 로직 (기존과 동일하게 유지)
// ... (생략) ...

// 4. 실시간 태양 광원(낮/밤) 분리 로직 (수정됨)
setTimeout(() => {
  const scene = world.scene();
  const camera = world.camera();
  
  // 카메라에 기본 부착된 방향성 조명(DirectionalLight) 추출
  const defaultLight = camera.children.find(c => c.type === 'DirectionalLight');
  if (defaultLight) {
    camera.remove(defaultLight);
    scene.add(defaultLight);
    defaultLight.intensity = 2.5; // 밝기 최적화
  }
  
  // 우주 공간의 기본 조도 추가
  scene.add(new THREE.AmbientLight(0x222222));

  setInterval(() => {
    const now = new Date();
    // 태양의 경도(Longitude) 계산
    const sunLng = -((now.getUTCHours() + now.getUTCMinutes() / 60) * 15 - 180);
    const rad = sunLng * Math.PI / 180;
    
    if (defaultLight) {
      // [핵심 수정됨] 곱하는 거리를 100(지구 표면)에서 2000(먼 우주)으로 수정해야 밤/낮 텍스처가 계산됩니다.
      defaultLight.position.set(Math.cos(rad) * 2000, 0, Math.sin(rad) * 2000);
    }
  }, 1000);
}, 1000); // 씬(Scene)이 렌더링될 시간을 벌기 위한 여유 대기
