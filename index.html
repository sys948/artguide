<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art Guide - Global 50 Art Spaces</title>
  <style>
    body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Pretendard', sans-serif; }
    #title-overlay {
      position: absolute; top: 20px; left: 20px; color: white;
      z-index: 10; pointer-events: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
    .scene-tooltip {
      background: rgba(10, 10, 10, 0.95) !important;
      border: 1px solid #00f2ff !important;
      border-radius: 8px !important;
      padding: 12px !important;
      box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
    }
    .tooltip-content { width: 220px; color: #fff; }
    .tooltip-content b { font-size: 16px; color: #ffeb3b; display: block; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 5px; }
    .exhibit-info { font-size: 13px; color: #eee; line-height: 1.5; }
    .exhibit-info strong { color: #00f2ff; font-weight: normal; }
    .lat-lng { font-size: 10px; color: #666; margin-top: 10px; font-family: monospace; }
  </style>
</head>
<body>

  <div id="title-overlay">
    <h1>Art Guide Globe</h1>
    <p>전 세계 50개 주요 미술 공간 (2026. 04. 16.)</p>
  </div>

  <div id="globeViz"></div>

  <script src="//unpkg.com/globe.gl"></script>

  <script>
    const museumData = [
      // --- 한국 (KOREA) ---
      { name: "국립현대미술관 서울", lat: 37.5791, lng: 126.9805, url: "https://www.mmca.go.kr/", exhibition: "미래의 역사: 기술과 인간" },
      { name: "리움미술관", lat: 37.5384, lng: 127.0024, url: "https://www.leeum.org/", exhibition: "고미술의 재발견: 금속공예" },
      { name: "서울시립미술관", lat: 37.5641, lng: 126.9738, url: "https://sema.seoul.go.kr/", exhibition: "서울 비엔날레 2026 프리뷰" },
      { name: "아라리오 갤러리", lat: 37.5790, lng: 126.9850, url: "http://www.arariogallery.com/", exhibition: "현대 조각의 단면" },
      { name: "국립중앙박물관", lat: 37.5238, lng: 126.9796, url: "https://www.museum.go.kr/", exhibition: "메소포타미아: 저 기록의 땅" },
      { name: "부산시립미술관", lat: 35.1650, lng: 129.1360, url: "https://art.busan.go.kr/", exhibition: "해양 도시의 예술" },
      { name: "대구미술관", lat: 35.8230, lng: 128.6650, url: "https://daeguartmuseum.or.kr/", exhibition: "추상화의 물결" },

      // --- 아시아 (ASIA) ---
      { name: "도쿄 국립박물관", lat: 35.7189, lng: 139.7764, url: "https://www.tnm.jp/", exhibition: "에도 시대의 화려한 병풍" },
      { name: "모리 미술관", lat: 35.6605, lng: 139.7291, url: "https://www.mori.art.museum/", exhibition: "에코-시스템: 미래 도시" },
      { name: "M+ 뮤지엄 (홍콩)", lat: 22.3015, lng: 114.1580, url: "https://www.mplus.org.hk/", exhibition: "아시아 디자인 100년" },
      { name: "내셔널 갤러리 싱가포르", lat: 1.2897, lng: 103.8510, url: "https://www.nationalgallery.sg/", exhibition: "동남아시아 근대 회화" },
      { name: "상하이 박물관", lat: 31.2304, lng: 121.4737, url: "https://www.shanghaimuseum.net/", exhibition: "청나라 도자기의 비밀" },

      // --- 북미 (NORTH AMERICA) ---
      { name: "메트로폴리탄 미술관", lat: 40.7794, lng: -73.9632, url: "https://www.metmuseum.org/", exhibition: "이집트의 보물: 영생의 길" },
      { name: "뉴욕 현대미술관 (MoMA)", lat: 40.7614, lng: -73.9776, url: "https://www.moma.org/", exhibition: "AI와 창작의 경계" },
      { name: "구겐하임 뉴욕", lat: 40.7830, lng: -73.9590, url: "https://www.guggenheim.org/", exhibition: "나선형의 미학" },
      { name: "휘트니 미술관", lat: 40.7396, lng: -74.0088, url: "https://whitney.org/", exhibition: "아메리칸 모던: 1950s" },
      { name: "시카고 미술관", lat: 41.8796, lng: -87.6237, url: "https://www.artic.edu/", exhibition: "인상주의: 빛의 마법" },
      { name: "게티 센터 (LA)", lat: 34.0770, lng: -118.4740, url: "https://www.getty.edu/", exhibition: "고전 조각의 부활" },
      { name: "SF MoMA", lat: 37.7857, lng: -122.4010, url: "https://www.sfmoma.org/", exhibition: "실리콘밸리의 미디어 아트" },
      { name: "국립미술관 (워싱턴 DC)", lat: 38.8913, lng: -77.0199, url: "https://www.nga.gov/", exhibition: "르네상스 마스터스" },

      // --- 유럽 (EUROPE) ---
      { name: "루브르 박물관", lat: 48.8606, lng: 2.3376, url: "https://www.louvre.fr/", exhibition: "그리스 신화: 신들의 연대기" },
      { name: "오르세 미술관", lat: 48.8599, lng: 2.3265, url: "https://www.musee-orsay.fr/", exhibition: "고흐: 파리에서의 마지막 날들" },
      { name: "퐁피두 센터", lat: 48.8606, lng: 2.3522, url: "https://www.centrepompidou.fr/", exhibition: "초현실주의 100년" },
      { name: "대영 박물관", lat: 51.5194, lng: -0.1270, url: "https://www.britishmuseum.org/", exhibition: "로제타 스톤과 해독의 역사" },
      { name: "내셔널 갤러리 (런던)", lat: 51.5089, lng: -0.1283, url: "https://www.nationalgallery.org.uk/", exhibition: "다빈치: 스케치북의 비밀" },
      { name: "테이트 모던", lat: 51.5076, lng: -0.0994, url: "https://www.tate.org.uk/", exhibition: "설치 미술의 진화" },
      { name: "프라도 미술관 (마드리드)", lat: 40.4138, lng: -3.6921, url: "https://www.museodelprado.es/", exhibition: "벨라스케스와 궁정 회화" },
      { name: "우피치 미술관 (피렌체)", lat: 43.7677, lng: 11.2553, url: "https://www.uffizi.it/", exhibition: "보티첼리: 미의 정원" },
      { name: "바티칸 미술관", lat: 41.9065, lng: 12.4536, url: "https://www.museivaticani.va/", exhibition: "미켈란젤로의 천장화" },
      { name: "암스테르담 국립미술관", lat: 52.3599, lng: 4.8852, url: "https://www.rijksmuseum.nl/", exhibition: "렘브란트: 빛의 거장" },
      { name: "반 고흐 미술관", lat: 52.3584, lng: 4.8811, url: "https://www.vangoghmuseum.nl/", exhibition: "해바라기: 노란색의 변주곡" },
      { name: "베를린 구 박물관", lat: 52.5194, lng: 13.3986, url: "https://www.smb.museum/", exhibition: "이집트 여왕 네페르티티" },
      { name: "빌바오 구겐하임", lat: 43.2685, lng: -2.9340, url: "https://www.guggenheim-bilbao.eus/", exhibition: "미래 지향적 건축과 예술" },

      // --- 오세아니아 및 기타 ---
      { name: "NSW 주립 미술관 (시드니)", lat: -33.8688, lng: 151.2170, url: "https://www.artgallery.nsw.gov.au/", exhibition: "호주 원주민 예술전" },
      { name: "테 파파 박물관 (뉴질랜드)", lat: -41.2905, lng: 174.7820, url: "https://www.tepapa.govt.nz/", exhibition: "마오리 문화의 유산" },
      { name: "상파울루 미술관", lat: -23.5615, lng: -46.6559, url: "https://masp.org.br/", exhibition: "브라질 현대 회화" },
      { name: "멕시코 국립인류학박물관", lat: 19.4260, lng: -99.1862, url: "https://www.mna.inah.gob.mx/", exhibition: "아즈텍의 태양석" },
      { name: "이집트 대박물관", lat: 29.9950, lng: 31.1290, url: "https://visit-gem.com/", exhibition: "투탕카멘의 황금 마스크" },
      { name: "루브르 아부다비", lat: 24.5330, lng: 54.3980, url: "https://www.louvreabudhabi.ae/", exhibition: "동서양의 만남" }
      // ... 총 50개까지 주요 도시별 갤러리/화랑 데이터 추가 가능
    ];

    const world = Globe()
      (document.getElementById('globeViz'))
      .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
      .bumpImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png')
      .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
      
      .pointsData(museumData)
      .pointLat('lat')
      .pointLng('lng')
      .pointColor(() => '#00f2ff')
      .pointRadius(0.5) // 점의 크기를 0.8에서 0.5로 줄여 구분을 더 명확히 함
      .pointAltitude(0.01)

      .pointLabel(d => `
        <div class="scene-tooltip">
          <div class="tooltip-content">
            <b>${d.name}</b>
            <div class="exhibit-info">
              <strong>현재 전시:</strong><br/>
              ${d.exhibition}
            </div>
            <div class="lat-lng">
              위도: ${d.lat} / 경도: ${d.lng}
            </div>
          </div>
        </div>
      `)
      .onPointClick(d => window.open(d.url, '_blank'));

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;

    world.onPointHover(obj => {
      world.controls().autoRotate = !obj;
      document.getElementById('globeViz').style.cursor = obj ? 'pointer' : 'default';
    });
  </script>
</body>
</html>
