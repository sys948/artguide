<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art Guide - Global Live Globe</title>
  
  <script src="https://unpkg.com/three@0.150.1/build/three.min.js"></script>
  <script src="https://unpkg.com/globe.gl@2.30.0/dist/globe.gl.min.js"></script>

  <style>
    body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Pretendard', sans-serif; color: white; }
    #title-overlay { position: absolute; top: 20px; left: 20px; z-index: 100; pointer-events: none; }
    
    /* 왼쪽 하단 시간 탭 */
    #time-panel {
      position: absolute; bottom: 30px; left: 20px; z-index: 100;
      background: rgba(0, 10, 20, 0.85); border: 1px solid rgba(0, 242, 255, 0.5);
      padding: 15px; border-radius: 12px; backdrop-filter: blur(10px); width: 200px;
    }
    .time-item { margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .time-item label { font-size: 11px; color: #00f2ff; font-weight: bold; letter-spacing: 1px; }
    .time-item span { font-size: 16px; font-family: 'Courier New', monospace; font-weight: bold; }

    /* 툴팁 스타일 */
    .scene-tooltip { 
      background: rgba(0, 5, 10, 0.95) !important; 
      border: 1px solid #00f2ff !important; 
      padding: 12px !important; 
      border-radius: 8px !important; 
      color: white !important;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="title-overlay">
    <h1 style="margin:0; font-size: 22px; color: #00f2ff;">Art Guide Globe</h1>
    <p style="margin:5px 0; font-size: 12px; opacity: 0.8;">실시간 낮/밤 동기화 & 글로벌 전시 가이드</p>
  </div>

  <div id="time-panel">
    <div class="time-item"><label>SEOUL</label><span id="time-seoul">--:--:--</span></div>
    <div class="time-item"><label>LONDON</label><span id="time-london">--:--:--</span></div>
    <div class="time-item"><label>NEW YORK</label><span id="time-newyork">--:--:--</span></div>
    <div class="time-item"><label>PARIS</label><span id="time-paris">--:--:--</span></div>
  </div>

  <div id="globeViz"></div>

  <script>
    // 2026. 04. 17. 기준 오늘 날짜 설정
    const today = new Date('2026-04-17T00:00:00'); 

    // 1. 미술관 데이터
    const museumData = [
      { name: "국립현대미술관 서울", lat: 37.5791, lng: 126.9805, url: "https://www.mmca.go.kr/exhibitions/progressList.do", exhibitions: [{ title: "Connecting Bodies: Asian Women Artists", start: "2025-09-03", end: "2026-05-10" }] },
      { name: "테이트 모던", lat: 51.5076, lng: -0.0994, url: "https://www.tate.org.uk/whats-on/tate-modern/exhibition/tracey-emin", exhibitions: [{ title: "Tracey Emin: Use Me", start: "2026-03-10", end: "2026-08-30" }] },
      { name: "루브르 박물관", lat: 48.8606, lng: 2.3376, url: "https://www.louvre.fr/en/exhibitions-and-events/exhibitions/michelangelo-and-rodin", exhibitions: [{ title: "Michelangelo and Rodin: Living bodies", start: "2026-04-15", end: "2026-07-20" }] },
      { name: "퐁피두 센터", lat: 48.8606, lng: 2.3522, url: "https://www.centrepompidou.fr/en/program/calendar?dateType=today", exhibitions: [{ title: "Matisse: The Red Studio", start: "2026-03-01", end: "2026-06-15" }] },
      { name: "메트로폴리탄 미술관", lat: 40.7794, lng: -73.9632, url: "https://www.metmuseum.org/exhibitions", exhibitions: [{ title: "Sleeping Beauties: Reawakening Fashion", start: "2026-04-10", end: "2026-09-02" }] },
      { name: "리움미술관", lat: 37.5384, lng: 127.0024, url: "https://www.leeum.org/exhibition/current.asp", exhibitions: [{ title: "Philippe Parreno: Voices", start: "2026-02-28", end: "2026-07-07" }] },
      { name: "휘트니 미술관", lat: 40.7396, lng: -74.0088, url: "https://whitney.org/exhibitions/2026-biennial", exhibitions: [{ title: "Whitney Biennial 2026", start: "2026-03-20", end: "2026-08-11" }] }
      // ... 추가 100개 데이터 적용 가능
    ];

    // 2. 지구본 초기화 (데이터 로딩 안정화)
    const globeElement = document.getElementById('globeViz');
    const world = Globe()(globeElement)
      .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
      .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
      .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
      .nightImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
      
      // 마커 설정
      .pointsData(museumData)
      .pointLat(d => d.lat)
      .pointLng(d => d.lng)
      .pointRadius(0.5) // 점 크기를 살짝 키워 가시성 확보
      .pointAltitude(0.02)
      .pointColor(() => '#00f2ff') // 사이언색으로 명확히 표시
      .pointLabel(d => {
        const cur = d.exhibitions.find(ex => today >= new Date(ex.start) && today <= new Date(ex.end));
        return `
          <div class="scene-tooltip">
            <b style="color: #00f2ff; font-size: 15px;">${d.name}</b><br/>
            <div style="margin-top: 5px; font-size: 13px;">
              <strong>Current:</strong> ${cur ? cur.title : 'Check Website'}
            </div>
          </div>
        `;
      })
      .onPointClick(d => window.open(d.url, '_blank'));

    // 자동 회전
    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;
    world.onPointHover(obj => { world.controls().autoRotate = !obj; });

    // 3. 실시간 국제 시계 로직
    function updateClock() {
      const now = new Date();
      const opts = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
      try {
        document.getElementById('time-seoul').innerText = new Intl.DateTimeFormat('en-US', { ...opts, timeZone: 'Asia/Seoul' }).format(now);
        document.getElementById('time-london').innerText = new Intl.DateTimeFormat('en-US', { ...opts, timeZone: 'Europe/London' }).format(now);
        document.getElementById('time-newyork').innerText = new Intl.DateTimeFormat('en-US', { ...opts, timeZone: 'America/New_York' }).format(now);
        document.getElementById('time-paris').innerText = new Intl.DateTimeFormat('en-US', { ...opts, timeZone: 'Europe/Paris' }).format(now);
      } catch (e) {}
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 4. 실시간 낮/밤 광원 설정 (태양 위치 동기화)
    setTimeout(() => {
      const scene = world.scene();
      const camera = world.camera();
      
      const sunLight = camera.children.find(c => c.type === 'DirectionalLight');
      if (sunLight) {
        camera.remove(sunLight);
        scene.add(sunLight);
        sunLight.intensity = 3; 
      }
      
      scene.add(new THREE.AmbientLight(0x333333)); // 밤인 지역의 최소 밝기

      setInterval(() => {
        const now = new Date();
        const sunLng = -((now.getUTCHours() + now.getUTCMinutes() / 60) * 15 - 180);
        const rad = sunLng * Math.PI / 180;
        if (sunLight) {
          sunLight.position.set(Math.cos(rad) * 100, 0, Math.sin(rad) * 100);
        }
      }, 1000);
    }, 1500); // 넉넉한 대기 시간 후 광원 적용
  </script>
</body>
</html>
