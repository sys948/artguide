<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art Guide - Global 1000 Art Spaces</title>
  
  <style>
    /* 1. CSS 레이아웃 강제 고정 (지구본이 안 나오는 주 원인 해결) */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      overflow: hidden;
      font-family: sans-serif;
    }
    
    #globeViz {
      width: 100vw;
      height: 100vh;
      display: block;
    }

    #title-overlay {
      position: absolute; 
      top: 20px; 
      left: 20px; 
      color: white;
      z-index: 10; 
      pointer-events: none; 
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    #time-panel {
      position: absolute;
      bottom: 20px;
      left: 20px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid #00f2ff;
      border-radius: 10px;
      padding: 15px;
      width: 280px;
      color: white;
    }
    
    .tabs { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
    .tab { 
      padding: 4px 8px; 
      background: #333; 
      border-radius: 5px; 
      font-size: 11px; 
      cursor: pointer; 
    }
    .tab.active { background: #00f2ff; color: #000; }
    #time-clock { font-size: 24px; font-weight: bold; margin-top: 5px; }
  </style>

  <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
  <script src="https://unpkg.com/globe.gl@2.31.1/dist/globe.gl.min.js"></script>
</head>
<body>
  
  <div id="title-overlay">
    <h2 style="margin:0">Art Guide Globe</h2>
    <p style="margin:5px 0; font-size:12px; color:#00f2ff">실시간 1000대 미술관 가이드</p>
  </div>

  <div id="time-panel">
    <div class="tabs">
      <div class="tab active" data-tz="Asia/Seoul">Seoul</div>
      <div class="tab" data-tz="Asia/Hong_Kong">HK</div>
      <div class="tab" data-tz="America/New_York">NY</div>
      <div class="tab" data-tz="Europe/London">LDN</div>
      <div class="tab" data-tz="Europe/Paris">PAR</div>
      <div class="tab" data-tz="Asia/Tokyo">TKO</div>
    </div>
    <div id="time-display">
      <div id="time-date" style="font-size:12px; color:#aaa">로딩 중...</div>
      <div id="time-clock">00:00:00</div>
    </div>
  </div>

  <div id="globeViz"></div>

  <script>
    // 3. 시계 기능
    let currentTimeZone = 'Asia/Seoul';
    function updateClock() {
      const now = new Date();
      const options = { timeZone: currentTimeZone, hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' };
      const dateOptions = { timeZone: currentTimeZone, year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('time-clock').textContent = now.toLocaleTimeString('en-US', options);
      document.getElementById('time-date').textContent = now.toLocaleDateString('ko-KR', dateOptions);
    }
    document.querySelectorAll('.tab').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTimeZone = btn.dataset.tz;
        updateClock();
      };
    });
    setInterval(updateClock, 1000);
    updateClock();

    // 4. 지구본 실행 (데이터 생성 및 렌더링)
    const artData = [...Array(1000).keys()].map(i => ({
      name: `Art Space #${i}`,
      lat: (Math.random() - 0.5) * 160,
      lng: (Math.random() - 0.5) * 360
    }));

    const world = Globe()(document.getElementById('globeViz'))
      .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
      .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
      .showAtmosphere(true)
      .atmosphereColor('#00f2ff')
      .customLayerData(artData)
      .customThreeObject(() => new THREE.Mesh(
        new THREE.SphereGeometry(0.35),
        new THREE.MeshBasicMaterial({ color: 0x00f2ff })
      ))
      .customThreeObjectUpdate((obj) => {
        // 무작위 반짝임 효과
        const s = 0.6 + Math.abs(Math.sin(Date.now() * 0.002 + Math.random()));
        obj.scale.set(s, s, s);
      });

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 1.0;

    // 조명 및 야간 텍스처 (로딩 완료 후 실행)
    world.onGlobeReady(() => {
      const scene = world.scene();
      
      // 태양광
      const sun = new THREE.DirectionalLight(0xffffff, 3.0);
      sun.position.set(1, 1, 1);
      scene.add(sun);

      // 야간 텍스처
      new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-night.jpg', tex => {
        const mat = world.globeMaterial();
        mat.emissiveMap = tex;
        mat.emissive = new THREE.Color(0xffeeba);
        mat.emissiveIntensity = 2.0;
      });
    });

    // 리사이즈 대응
    window.onresize = () => world.width(window.innerWidth).height(window.innerHeight);
  </script>
</body>
</html>
