<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art Guide - Global 1000 Art Spaces</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  
  <style>
    body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Pretendard', sans-serif; }
    #globeViz { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; background: #000; }
    #title-overlay { position: absolute; top: 30px; left: 30px; color: white; z-index: 10; pointer-events: none; text-shadow: 0px 4px 15px rgba(0, 242, 255, 0.6); }
    #title-overlay h1 { margin: 0; font-size: 28px; font-weight: 800; letter-spacing: 1px; }
    #title-overlay p { margin: 8px 0 0; font-size: 14px; color: #aaa; }
    #time-panel { position: absolute; bottom: 30px; left: 30px; z-index: 10; background: rgba(10, 15, 20, 0.85); backdrop-filter: blur(10px); border: 1px solid rgba(0, 242, 255, 0.3); border-radius: 12px; padding: 20px; width: 320px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8); }
    .tabs { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
    .tab { padding: 6px 12px; background: rgba(255, 255, 255, 0.1); color: #aaa; border-radius: 20px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid transparent; }
    .tab.active { background: rgba(0, 242, 255, 0.15); color: #00f2ff; border-color: #00f2ff; }
    #time-display { color: #fff; }
    #time-date { font-size: 13px; color: #888; margin-bottom: 5px; }
    #time-clock { font-size: 26px; font-weight: 700; color: #fff; letter-spacing: 1px; }
    .tooltip-content { width: 200px; color: #fff; padding: 5px; }
    .tooltip-content b { color: #00f2ff; display: block; margin-bottom: 5px; }
    #error-box { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(255,0,0,0.9); color: white; padding: 20px; border-radius: 8px; z-index: 1000; text-align: center; }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.158.0/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/globe.gl@2.31.1/dist/globe.gl.min.js"></script>
</head>
<body>
  
  <div id="title-overlay">
    <h1>Art Guide Globe</h1>
    <p>실시간 1000대 미술관 가이드 (2026. 04. 17.)</p>
  </div>

  <div id="time-panel">
    <div class="tabs">
      <div class="tab active" data-tz="Asia/Seoul">Seoul</div>
      <div class="tab" data-tz="Asia/Hong_Kong">Hong Kong</div>
      <div class="tab" data-tz="America/New_York">New York</div>
      <div class="tab" data-tz="Europe/London">London</div>
      <div class="tab" data-tz="Europe/Paris">Paris</div>
      <div class="tab" data-tz="Asia/Tokyo">Tokyo</div>
    </div>
    <div id="time-display">
      <div id="time-date">로딩 중...</div>
      <div id="time-clock">00:00:00</div>
    </div>
  </div>

  <div id="error-box"></div>
  <div id="globeViz"></div>

  <script>
    // 1. 시계 로직 (즉시 실행)
    let currentTimeZone = 'Asia/Seoul';
    function updateClock() {
      const now = new Date();
      const df = new Intl.DateTimeFormat('ko-KR', { timeZone: currentTimeZone, year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
      const tf = new Intl.DateTimeFormat('en-US', { timeZone: currentTimeZone, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
      document.getElementById('time-date').textContent = df.format(now);
      document.getElementById('time-clock').textContent = tf.format(now);
    }
    document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', e => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      e.target.classList.add('active');
      currentTimeZone = e.target.getAttribute('data-tz');
      updateClock();
    }));
    setInterval(updateClock, 1000); updateClock();

    // 2. 지구본 로드 체크 및 실행 (핵심 보강)
    function initGlobe() {
      if (typeof Globe === 'undefined') {
        setTimeout(initGlobe, 200); // 0.2초마다 다시 체크
        return;
      }

      try {
        const artSpaces = [];
        const baseArtSpaces = [
          { name: "국립현대미술관 (MMCA)", lat: 37.582, lng: 126.982 },
          { name: "MoMA", lat: 40.761, lng: -73.977 },
          { name: "Tate Modern", lat: 51.507, lng: -0.099 },
          { name: "Louvre", lat: 48.860, lng: 2.337 },
          { name: "Mori Art Museum", lat: 35.660, lng: 139.729 },
          { name: "LACMA", lat: 34.063, lng: -118.359 }
        ];
        
        // 1000개 데이터 생성
        for (let i = 0; i < 1000; i++) {
          artSpaces.push(i < baseArtSpaces.length ? baseArtSpaces[i] : {
            name: `Art Space #${i}`,
            lat: (Math.random() - 0.5) * 150,
            lng: (Math.random() - 0.5) * 360
          });
        }

        const world = Globe()(document.getElementById('globeViz'))
          .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
          .bumpImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png')
          .showAtmosphere(true)
          .atmosphereColor('#00f2ff')
          .customLayerData(artSpaces)
          .customThreeObject(() => new THREE.Mesh(
            new THREE.SphereGeometry(0.4),
            new THREE.MeshBasicMaterial({ color: 0x00f2ff })
          ))
          .customThreeObjectUpdate((obj) => {
            const s = 0.5 + Math.abs(Math.sin(Date.now() * 0.003 + Math.random()));
            obj.scale.set(s, s, s);
          })
          .customLayerLabel(d => `<div class="tooltip-content"><b>${d.name}</b></div>`);

        world.controls().autoRotate = true;
        world.pointOfView({ lat: 37, lng: 127, altitude: 2.5 });

        // 조명 및 야간 텍스처
        world.onGlobeReady(() => {
          const scene = world.scene();
          const sun = new THREE.DirectionalLight(0xffffff, 3.5);
          sun.position.set(1, 1, 1);
          scene.add(sun);

          new THREE.TextureLoader().load('//unpkg.com/three-globe/example/img/earth-night.jpg', tex => {
            const mat = world.globeMaterial();
            mat.emissiveMap = tex;
            mat.emissive = new THREE.Color(0xffeeba);
            mat.emissiveIntensity = 2.0;
          });
        });

      } catch (e) {
        const box = document.getElementById('error-box');
        box.style.display = 'block';
        box.textContent = "Error: " + e.message;
      }
    }

    // 문서가 완전히 읽히면 시작
    if (document.readyState === 'complete') initGlobe();
    else window.addEventListener('load', initGlobe);

  </script>
</body>
</html>
