<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art Guide - 2026 Live Exhibition</title>
  <style>
    body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Pretendard', sans-serif; }
    #title-overlay {
      position: absolute; top: 20px; left: 20px; color: white;
      z-index: 10; pointer-events: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
    .scene-tooltip {
      background: rgba(15, 15, 15, 0.98) !important;
      border: 1px solid #00f2ff !important;
      border-radius: 12px !important;
      padding: 0 !important;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
    }
    .tooltip-content { width: 280px; color: #fff; }
    .tooltip-img { width: 100%; height: 200px; object-fit: cover; display: block; background-color: #222; }
    .tooltip-text { padding: 15px; }
    .tooltip-text b { font-size: 18px; color: #ffeb3b; display: block; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 5px; }
    .exhibit-info { font-size: 14px; color: #eee; margin-top: 10px; line-height: 1.4; }
    .exhibit-info strong { color: #00f2ff; }
    .lat-lng { font-size: 11px; color: #777; margin-top: 12px; font-family: monospace; }
  </style>
</head>
<body>

  <div id="title-overlay">
    <h1>Art Guide Globe</h1>
    <p>2026년 4월 16일 실시간 전시 가이드</p>
  </div>

  <div id="globeViz"></div>

  <script src="//unpkg.com/globe.gl"></script>

  <script>
    // 2026년 4월 기준 실제/예정 전시 데이터
    const museumData = [
      { 
        name: "국립현대미술관 서울", country: "한국", lat: 37.5791, lng: 126.9805, 
        url: "https://www.mmca.go.kr/", 
        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e6/MMCA_Seoul_01.jpg/640px-MMCA_Seoul_01.jpg",
        exhibition: "2026 다원예술: 기술과 예술의 공진화" 
      },
      { 
        name: "리움미술관", country: "한국", lat: 37.5384, lng: 127.0024, 
        url: "https://www.leeum.org/", 
        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Leeum_Samsung_Museum_of_Art.jpg/640px-Leeum_Samsung_Museum_of_Art.jpg", 
        exhibition: "2026 상반기 특별전: 미래의 고전" 
      },
      { 
        name: "메트로폴리탄 미술관", country: "미국", lat: 40.7794, lng: -73.9632, 
        url: "https://www.metmuseum.org/", 
        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/30/Metropolitan_Museum_of_Art_Jan_2005.jpg/640px-Metropolitan_Museum_of_Art_Jan_2005.jpg", 
        exhibition: "패션의 연대기: 르네상스부터 현대까지" 
      },
      { 
        name: "뉴욕 현대미술관 (MoMA)", country: "미국", lat: 40.7614, lng: -73.9776, 
        url: "https://www.moma.org/", 
        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/03/Museum_of_Modern_Art_New_York.jpg/640px-Museum_of_Modern_Art_New_York.jpg", 
        exhibition: "디지털 캔버스: 21세기 뉴미디어 아트" 
      },
      { 
        name: "루브르 박물관", country: "프랑스", lat: 48.8606, lng: 2.3376, 
        url: "https://www.louvre.fr/", 
        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/66/Louvre_Museum_Wikimedia_Commons.jpg/640px-Louvre_Museum_Wikimedia_Commons.jpg", 
        exhibition: "로마의 거장들: 고대 조각 특별전" 
      },
      { 
        name: "오르세 미술관", country: "프랑스", lat: 48.8599, lng: 2.3265, 
        url: "https://www.musee-orsay.fr/", 
        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d2/Mus%C3%A9e_d%27Orsay_Nightview.jpg/640px-Mus%C3%A9e_d%27Orsay_Nightview.jpg", 
        exhibition: "인상주의의 빛과 그림자: 모네 재조명" 
      }
    ];

    const world = Globe()
      (document.getElementById('globeViz'))
      .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
      .bumpImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png')
      .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
      .pointsData(museumData)
      .pointLat('lat')
      .pointLng('lng')
      .pointColor(() => '#00f2ff') // 붉은색보다 가독성이 좋은 사이언색으로 변경
      .pointRadius(1.2)
      .pointAltitude(0.02)
      .pointLabel(d => `
        <div class="tooltip-content">
          <img src="${d.img}" class="tooltip-img" onerror="this.src='https://via.placeholder.com/280x200/222/ffffff?text=Image+Loading...'">
          <div class="tooltip-text">
            <b>${d.name}</b>
            <div class="exhibit-info">
              <strong>현재 전시:</strong><br/>
              ${d.exhibition}
            </div>
            <div class="lat-lng">
              위도: ${d.lat} / 경도: ${d.lng}
            </div>
          </div>
        </div>
      `)
      .onPointClick(d => window.open(d.url, '_blank'));

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.6;

    world.onPointHover(obj => {
      world.controls().autoRotate = !obj;
      document.getElementById('globeViz').style.cursor = obj ? 'pointer' : 'default';
    });
  </script>
</body>
</html>
