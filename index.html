<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art Guide - Global 1000 Art Spaces</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  
  <style>
    body { 
      margin: 0; 
      background-color: #000000; 
      overflow: hidden; 
      font-family: 'Pretendard', sans-serif; 
    }
    
    /* [핵심 해결] 3D 캔버스가 그려질 공간의 크기를 강제로 브라우저 화면 100%로 고정합니다. */
    #globeViz {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1; 
    }

    /* UI 요소들은 지구본 위(z-index: 10)에 배치되도록 설정합니다. */
    #title-overlay {
      position: absolute; 
      top: 30px; 
      left: 30px; 
      color: white;
      z-index: 10; 
      pointer-events: none; 
      text-shadow: 0px 4px 15px rgba(0, 242, 255, 0.6);
    }
    #title-overlay h1 { margin: 0; font-size: 28px; font-weight: 800; letter-spacing: 1px; }
    #title-overlay p { margin: 8px 0 0; font-size: 14px; color: #aaa; }

    #time-panel {
      position: absolute;
      bottom: 30px;
      left: 30px;
      z-index: 10;
      background: rgba(10, 15, 20, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 242, 255, 0.3);
      border-radius: 12px;
      padding: 20px;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
    }
    
    .tabs { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
    .tab { padding: 6px 12px; background: rgba(255, 255, 255, 0.1); color: #aaa; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; border: 1px solid transparent; }
    .tab:hover { background: rgba(255, 255, 255, 0.2); color: #fff; }
    .tab.active { background: rgba(0, 242, 255, 0.15); color: #00f2ff; border-color: #00f2ff; box-shadow: 0 0 10px rgba(0, 242, 255, 0.3); }

    #time-display { color: #fff; }
    #time-date { font-size: 13px; color: #888; margin-bottom: 5px; }
    #time-clock { font-size: 26px; font-weight: 700; color: #fff; letter-spacing: 1px; }

    .scene-tooltip { background: rgba(0, 5, 10, 0.95) !important; border: 1px solid #00f2ff !important; border-radius: 8px !important; padding: 15px !important; box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); font-family: 'Pretendard', sans-serif; }
    .tooltip-content { width: 220px; color: #fff; pointer-events: none; }
    .tooltip-content b { font-size: 18px; color: #00f2ff; display: block; margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 8px; }
    .exhibit-info { font-size: 13px; color: #ccc; line-height: 1.6; }
  </style>
</head>
<body>
  
  <div id="title-overlay">
    <h1>Art Guide Globe</h1>
    <p>실시간 1000대 미술관 가이드 (2026. 04. 17.)</p>
  </div>

  <div id="time-panel">
    <div class="tabs">
      <div class="tab active" data-tz="Asia/Seoul">Seoul</div>
      <div class="tab" data-tz="Asia/Hong_Kong">Hong Kong</div>
      <div class="tab" data-tz="America/New_York">New York</div>
      <div class="tab" data-tz="Europe/London">London</div>
      <div class="tab" data-tz="Europe/Paris">Paris</div>
      <div class="tab" data-tz="Europe/Berlin">Berlin</div>
      <div class="tab" data-tz="Europe/Rome">Venice</div>
      <div class="tab" data-tz="Europe/Zurich">Basel</div>
    </div>
    <div id="time-display">
      <div id="time-date">로딩 중...</div>
      <div id="time-clock">00:00:00</div>
    </div>
  </div>

  <div id="globeViz"></div>

  <script src="https://unpkg.com/three"></script>
  <script src="https://unpkg.com/globe.gl"></script>

  <script>
    // 모든 3D 로직을 에러 캐치(try-catch)로 감싸서, 일부 실패해도 하얀 화면이 뜨지 않도록 방어합니다.
    try {
      // 1. 미술관 데이터 1000개 세팅 (기존 6개 + 랜덤 994개)
      const artSpaces = [
        { name: "국립현대미술관 (MMCA)", city: "Seoul", lat: 37.582, lng: 126.982, desc: "한국 현대미술의 중심지" },
        { name: "모리 미술관", city: "Tokyo", lat: 35.660, lng: 139.729, desc: "롯폰기 힐즈의 현대미술관" },
        { name: "LACMA", city: "LA", lat: 34.063, lng: -118.359, desc: "미국 서부 최대 규모의 미술관" },
        { name: "MoMA", city: "New York", lat: 40.761, lng: -73.977, desc: "세계 최고의 현대미술 컬렉션" },
        { name: "테이트 모던", city: "London", lat: 51.507, lng: -0.099, desc: "발전소를 개조한 현대미술관" },
        { name: "루브르 박물관", city: "Paris", lat: 48.860, lng: 2.337, desc: "세계 3대 박물관 중 하나" }
      ];

      for (let i = 1; i <= 994; i++) {
        artSpaces.push({
          name: `글로벌 아트 스페이스 #${i}`,
          city: "Global Hub",
          lat: (Math.random() - 0.5) * 160, 
          lng: (Math.random() - 0.5) * 360,
          desc: "세계 곳곳에 숨겨진 예술 거점"
        });
      }

      // 2. 다이아몬드(별) 모양의 기하학 구조와 색상 세팅 (에러 없는 100% 순수 코드 방식)
      const starGeo = new THREE.OctahedronGeometry(0.5, 0); 
      const starMat = new THREE.MeshBasicMaterial({ color: 0x00f2ff });

      // 3. 지구본 렌더링 시작
      const globeContainer = document.getElementById('globeViz');
      const world = Globe()(globeContainer)
        .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
        .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
        .showAtmosphere(true)
        .atmosphereColor('#00f2ff')
        .atmosphereAltitude(0.15)
        
        // 1000개의 점 찍기
        .customLayerData(artSpaces)
        .customThreeObject(d => {
          const mesh = new THREE.Mesh(starGeo, starMat);
          const coords = world.getCoords(d.lat, d.lng, 0.015);
          mesh.position.set(coords.x, coords.y, coords.z);
          mesh.lookAt(new THREE.Vector3(0,0,0)); // 별이 지구 밖을 향하게
          
          // 반짝임 속도 세팅
          mesh.userData = {
            phase: Math.random() * 100,
            speed: 0.05 + Math.random() * 0.05,
            baseScale: 0.8 + Math.random() * 1.2
          };
          return mesh;
        })
        .customThreeObjectUpdate(obj => {
          if (!obj || !obj.userData) return;
          obj.userData.phase += obj.userData.speed;
          // 크기가 줄어들었다 커지며 반짝이도록 설정
          const scale = obj.userData.baseScale * (0.3 + 0.7 * Math.abs(Math.sin(obj.userData.phase)));
          obj.scale.set(scale, scale, scale);
        })
        .customLayerLabel(d => `
          <div class="tooltip-content">
            <b>${d.name}</b>
            <div class="exhibit-info">도시: ${d.city}<br/>특징: ${d.desc}</div>
          </div>
        `)
        .onCustomLayerHover(point => {
          world.controls().autoRotate = !point;
          document.body.style.cursor = point ? 'pointer' : 'default';
        });

      world.controls().autoRotate = true;
      world.controls().autoRotateSpeed = 1.0;
      world.pointOfView({ lat: 37.5, lng: 126.9, altitude: 2.5 });

      // 4. 안전한 조명 및 야간 불빛 텍스처 처리
      // 지구본이 완전히 준비된 후 1초 뒤에 조명과 야간 불빛을 씌워 충돌을 막습니다.
      setTimeout(() => {
        try {
          const scene = world.scene();
          const camera = world.camera();

          // 기본 카메라 조명을 끕니다.
          if (camera && camera.children) {
            camera.children.forEach(c => { if (c.isLight) c.intensity = 0; });
          }

          // 커스텀 태양광을 추가합니다.
          const sunLight = new THREE.DirectionalLight(0xffffff, 3.0); 
          scene.add(sunLight);

          function updateSunPosition() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 0);
            const dayOfYear = Math.floor((now - start) / 86400000);
            
            const declination = -23.44 * Math.cos((360 / 365) * (dayOfYear + 10) * (Math.PI / 180));
            const utcHours = now.getUTCHours() + now.getUTCMinutes() / 60 + now.getUTCSeconds() / 3600;
            const sunLng = 180 - (utcHours * 15);

            const radius = 300; 
            const phi = (90 - declination) * (Math.PI / 180);
            const theta = (90 - sunLng) * (Math.PI / 180);

            sunLight.position.set(
              radius * Math.sin(phi) * Math.cos(theta),
              radius * Math.cos(phi),
              radius * Math.sin(phi) * Math.sin(theta)
            );
          }
          
          updateSunPosition();
          setInterval(updateSunPosition, 60000);

          // 야간 도시 불빛 적용 (에러 무시)
          const mat = world.globeMaterial();
          if (mat) {
            new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-night.jpg', tex => {
              mat.emissiveMap = tex;
              mat.emissive = new THREE.Color(0xfff0aa);
              mat.emissiveIntensity = 2.0;
              mat.needsUpdate = true;
            });
          }
        } catch(lightError) {
          console.warn("조명 처리 중 무시 가능한 에러 발생", lightError);
        }
      }, 1500);

      // 화면 리사이즈 대응
      window.addEventListener('resize', () => {
        if (world && globeContainer) {
          world.width(globeContainer.clientWidth).height(globeContainer.clientHeight);
        }
      });

    } catch (e) {
      console.error("지구본 렌더링 치명적 에러:", e);
      // 에러가 발생해도 사이트가 멈춘 것처럼 보이지 않도록 콘솔에 로그를 남깁니다.
    }

    // ==========================================
    // 5. 국제 시간 탭 로직 (3D와 분리하여 100% 작동 보장)
    // ==========================================
    let currentTimeZone = 'Asia/Seoul';
    const tabs = document.querySelectorAll('.tab');
    const dateDisplay = document.getElementById('time-date');
    const clockDisplay = document.getElementById('time-clock');

    tabs.forEach(tab => {
      tab.addEventListener('click', (e) => {
        tabs.forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        currentTimeZone = e.target.getAttribute('data-tz');
        updateClock();
      });
    });

    function updateClock() {
      try {
        const now = new Date();
        const dateFormatter = new Intl.DateTimeFormat('ko-KR', { timeZone: currentTimeZone, year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
        const timeFormatter = new Intl.DateTimeFormat('en-US', { timeZone: currentTimeZone, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
        dateDisplay.textContent = dateFormatter.format(now);
        clockDisplay.textContent = timeFormatter.format(now);
      } catch(err) {
        dateDisplay.textContent = "시간 로드 오류";
      }
    }

    setInterval(updateClock, 1000);
    updateClock(); 
  </script>
</body>
</html>
