<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art Guide - Interactive Globe</title>
  <style>
    body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Pretendard', sans-serif; }
    #title-overlay {
      position: absolute; top: 20px; left: 20px; color: white;
      z-index: 10; pointer-events: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
    /* 마우스 올렸을 때 뜨는 팝업 스타일 */
    .scene-tooltip {
      color: #fff !important;
      background: rgba(0, 0, 0, 0.8) !important;
      padding: 10px !important;
      border-radius: 8px !important;
      border: 1px solid #555 !important;
      font-size: 14px !important;
      line-height: 1.5 !important;
    }
    .scene-tooltip b { color: #ffeb3b; display: block; margin-bottom: 5px; font-size: 16px; }
  </style>
</head>
<body>

  <div id="title-overlay">
    <h1>Art Guide Globe</h1>
    <p>점을 클릭하면 해당 미술관 홈페이지로 이동합니다.</p>
  </div>

  <div id="globeViz"></div>

  <script src="//unpkg.com/globe.gl"></script>

  <script>
    // 1. 데이터에 'url' 항목을 추가했습니다.
    const museumData = [
      { name: "루브르 박물관", country: "프랑스", lat: 48.8606, lng: 2.3376, url: "https://www.louvre.fr/en" },
      { name: "메트로폴리탄 미술관", country: "미국", lat: 40.7794, lng: -73.9632, url: "https://www.metmuseum.org/" },
      { name: "대영 박물관", country: "영국", lat: 51.5194, lng: -0.1270, url: "https://www.britishmuseum.org/" },
      { name: "국립현대미술관", country: "한국", lat: 37.5791, lng: 126.9805, url: "https://www.mmca.go.kr/" },
      { name: "구겐하임 빌바오", country: "스페인", lat: 43.2685, lng: -2.9340, url: "https://www.guggenheim-bilbao.eus/" },
      { name: "도쿄 국립 박물관", country: "일본", lat: 35.7189, lng: 139.7764, url: "https://www.tnm.jp/" },
      { name: "바티칸 미술관", country: "바티칸", lat: 41.9065, lng: 12.4536, url: "https://www.museivaticani.va/" }
    ];

    const world = Globe()
      (document.getElementById('globeViz'))
      .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
      .bumpImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png')
      .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
      
      .pointsData(museumData)
      .pointLat('lat')
      .pointLng('lng')
      .pointColor(() => '#ff3e3e')
      .pointRadius(0.6)
      .pointAltitude(0.02)
      
      // 2. 마우스 올렸을 때 정보 표시 (HTML 형식으로 커스텀)
      .pointLabel(d => `
        <div style="text-align: left;">
          <b>${d.name} (${d.country})</b>
          위도(Lat): ${d.lat}<br/>
          경도(Lng): ${d.lng}<br/>
          <span style="color: #4db6ac; font-size: 12px;">주소: ${d.url}</span>
        </div>
      `)
      
      // 3. 클릭 시 해당 URL로 새 탭에서 열기
      .onPointClick(d => {
        window.open(d.url, '_blank');
      });

    // 자동 회전 및 마우스 조작 설정
    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;
    
    // 점에 마우스를 올리면 커서 모양을 손가락 모양으로 변경
    world.onPointHover(obj => {
      document.getElementById('globeViz').style.cursor = obj ? 'pointer' : 'default';
    });

  </script>
</body>
</html>
