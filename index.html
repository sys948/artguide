<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art Guide - Global Live Globe</title>
  <style>
    body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Pretendard', sans-serif; color: white; }
    
    #title-overlay {
      position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none;
    }

    /* 왼쪽 하단 시간 탭 */
    #time-panel {
      position: absolute; bottom: 30px; left: 20px; z-index: 20;
      background: rgba(0, 10, 20, 0.85); border: 1px solid rgba(0, 242, 255, 0.5);
      padding: 15px; border-radius: 12px; backdrop-filter: blur(15px); width: 210px;
      box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
    }
    .time-item { margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .time-item label { font-size: 10px; color: #00f2ff; font-weight: bold; }
    .time-item span { font-size: 16px; font-family: 'Courier New', monospace; font-weight: bold; }

    .scene-tooltip {
      background: rgba(0, 5, 10, 0.95) !important; border: 1px solid #fff !important;
      border-radius: 4px !important; padding: 12px !important; color: white;
    }
  </style>
</head>
<body>

  <div id="title-overlay">
    <h1 style="margin:0; font-size: 24px; color: #00f2ff;">Art Guide Globe</h1>
    <p style="margin:5px 0; font-size: 14px; opacity: 0.8;">2026. 04. 17. 실시간 낮/밤 & 전시 가이드</p>
  </div>

  <div id="time-panel">
    <div class="time-item"><label>SEOUL</label><span id="time-seoul">--:--:--</span></div>
    <div class="time-item"><label>LONDON</label><span id="time-london">--:--:--</span></div>
    <div class="time-item"><label>NEW YORK</label><span id="time-newyork">--:--:--</span></div>
    <div class="time-item"><label>PARIS</label><span id="time-paris">--:--:--</span></div>
  </div>

  <div id="globeViz"></div>

  <script src="//unpkg.com/three"></script>
  <script src="//unpkg.com/globe.gl"></script>

  <script>
    const today = new Date();

    const museumData = [
      { 
        name: "국립현대미술관 서울", lat: 37.5791, lng: 126.9805, 
        url: "https://www.mmca.go.kr/exhibitions/progressList.do",
        exhibitions: [{ title: "Connecting Bodies: Asian Women Artists", start: "2025-09-03", end: "2026-05-10" }]
      },
      { 
        name: "테이트 모던", lat: 51.5076, lng: -0.0994, 
        url: "https://www.tate.org.uk/whats-on/tate-modern/exhibition/tracey-emin",
        exhibitions: [{ title: "Tracey Emin: Use Me", start: "2026-03-10", end: "2026-08-30" }]
      },
      { 
        name: "루브르 박물관", lat: 48.8606, lng: 2.3376, 
        url: "https://www.louvre.fr/en/exhibitions-and-events/exhibitions/michelangelo-and-rodin",
        exhibitions: [{ title: "Michelangelo and Rodin: Living bodies", start: "2026-04-15", end: "2026-07-20" }]
      },
      { 
        name: "퐁피두 센터", lat: 48.8606, lng: 2.3522, 
        url: "https://www.centrepompidou.fr/en/program/calendar?dateType=today",
        exhibitions: [{ title: "Matisse: The Red Studio", start: "2026-03-01", end: "2026-06-15" }]
      },
      { 
        name: "메트로폴리탄 미술관", lat: 40.7794, lng: -73.9632, 
        url: "https://www.metmuseum.org/exhibitions",
        exhibitions: [{ title: "Sleeping Beauties: Reawakening Fashion", start: "2026-04-10", end: "2026-09-02" }]
      }
    ].map(d => ({ ...d, phase: Math.random() * Math.PI * 2, speed: 0.2 + Math.random() * 0.3 }));

    const world = Globe()
      (document.getElementById('globeViz'))
      .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
      .bumpImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png')
      .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
      .nightImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
      .pointsData(museumData)
      .pointLat('lat')
      .pointLng('lng')
      .pointRadius(0.35)
      .pointAltitude(0.02)
      .pointLabel(d => {
        const current = d.exhibitions.find(ex => today >= new Date(ex.start) && today <= new Date(ex.end));
        return `
          <div class="scene-tooltip">
            <b>${d.name}</b><br/>
            <small>Current: ${current ? current.title : 'Check Website'}</small>
          </div>
        `;
      })
      .onPointClick(d => window.open(d.url, '_blank'));

    // --- 광원 및 낮/밤 그림자 설정 ---
    const scene = world.scene();
    // 주변광은 아주 낮게 설정하여 밤의 어둠을 강조
    scene.add(new THREE.AmbientLight(0x333333)); 
    
    // 태양 역할을 하는 강한 직사광선 추가
    const sunLight = new THREE.DirectionalLight(0xffffff, 2.5);
    scene.add(sunLight);

    function updateSunAndClock() {
      const now = new Date();
      
      // 1. 태양 위치 계산 (경도에 따라 낮과 밤 결정)
      const lon = (now.getUTCHours() + now.getUTCMinutes() / 60 + now.getUTCSeconds() / 3600) * 15 - 180;
      const rot = (lon + 180) * Math.PI / 180;
      sunLight.position.set(-Math.cos(rot), 0.5, Math.sin(rot));

      // 2. 하단 시계 업데이트
      const opts = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
      document.getElementById('time-seoul').innerText = new Intl.DateTimeFormat('en-US', { ...opts, timeZone: 'Asia/Seoul' }).format(now);
      document.getElementById('time-london').innerText = new Intl.DateTimeFormat('en-US', { ...opts, timeZone: 'Europe/London' }).format(now);
      document.getElementById('time-newyork').innerText = new Intl.DateTimeFormat('en-US', { ...opts, timeZone: 'America/New_York' }).format(now);
      document.getElementById('time-paris').innerText = new Intl.DateTimeFormat('en-US', { ...opts, timeZone: 'Europe/Paris' }).format(now);
    }

    // 초기 실행 및 반복
    updateSunAndClock();
    setInterval(updateSunAndClock, 1000);

    // 회전 설정
    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;

    // 반짝임 애니메이션
    (function animate() {
      world.pointColor(d => {
        const t = Date.now() * 0.002;
        const alpha = Math.max(0.3, (Math.sin(t * d.speed * 10 + d.phase) + 1) / 2);
        return `rgba(255, 255, 255, ${alpha})`;
      });
      requestAnimationFrame(animate);
    })();
  </script>
</body>
</html>
